name: Buy Lottery

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: false
        default: dry-run
        type: choice
        options:
          - dry-run
          - smoke
          - live
      product:
        description: Product to buy
        required: false
        default: all
        type: choice
        options:
          - all
          - lotto
          - pension
      force:
        description: Ignore existing purchase record
        required: false
        default: false
        type: boolean

jobs:
  buy:
    runs-on: macos-15
    permissions:
      actions: read
      contents: read
    env:
      DHLOTTERY_USERNAME: ${{ secrets.DHLOTTERY_USERNAME }}
      DHLOTTERY_PASSWORD: ${{ secrets.DHLOTTERY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright Chromium
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'smoke' || inputs.mode == 'live' }}
        run: npx playwright install chromium

      - name: Ensure artifacts dir
        run: mkdir -p artifacts/diagnostics

      - name: Run buy command
        run: |
          node --experimental-strip-types src/cli.ts buy \
            --mode=${{ github.event_name == 'schedule' && 'live' || inputs.mode }} \
            --product=${{ github.event_name == 'schedule' && 'all' || inputs.product }} \
            --force=${{ github.event_name == 'schedule' && 'false' || inputs.force }}

      - name: Upload purchase record
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'live' }}
        uses: actions/upload-artifact@v4
        with:
          name: purchase-record
          path: artifacts/purchase-record.json
          if-no-files-found: error

      - name: Upload diagnostics
        if: ${{ always() && (github.event_name == 'schedule' || inputs.mode == 'live' || inputs.mode == 'smoke') }}
        uses: actions/upload-artifact@v4
        with:
          name: buy-diagnostics-${{ github.run_id }}
          path: artifacts/diagnostics/
          if-no-files-found: warn
