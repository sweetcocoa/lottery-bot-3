name: Weekly Results

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: false
        default: dry-run
        type: choice
        options:
          - dry-run
          - live

jobs:
  results:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DHLOTTERY_USERNAME: ${{ secrets.DHLOTTERY_USERNAME }}
      DHLOTTERY_PASSWORD: ${{ secrets.DHLOTTERY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browser
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'live' }}
        run: npx playwright install --with-deps chromium

      - name: Ensure artifacts dir
        run: mkdir -p artifacts

      - name: Run summarize command
        run: |
          node --experimental-strip-types src/cli.ts summarize \
            --mode=${{ github.event_name == 'schedule' && 'live' || inputs.mode }}

      - name: Upload summary artifact
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: weekly-summary-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: ignore
